{{ $script := resources.Copy "assets/js/scripts.js" (resources.Get "js/scripts.js") | minify | fingerprint }}
<script src="{{ $script.RelPermalink }}"></script>
{{ if not hugo.IsServer }}
<script>
  var _paq = window._paq = window._paq || [];
  /* tracker methods like "setCustomDimension" should be called before "trackPageView" */
  _paq.push(['trackPageView']);
  _paq.push(['enableLinkTracking']);
  (function() {
    _paq.push(['setTrackerUrl', 'https://mtr.thomasdurand.fr/']);
    _paq.push(['setAPIUrl', 'https://mtm.thomasdurand.fr/']);
    _paq.push(['setSiteId', '{{ .Site.Params.matomoSiteID }}']);
    var d=document, g=d.createElement('script'), s=d.getElementsByTagName('script')[0];
    g.async=true; g.src='https://mtr.thomasdurand.fr/'; s.parentNode.insertBefore(g,s);
  })();
</script>
<noscript><p><img referrerpolicy="no-referrer-when-downgrade" src="https://mtr.thomasdurand.fr/?idsite={{ .Site.Params.matomoSiteID }}&amp;rec=1" style="border:0;" alt="" /></p></noscript>
{{ end }}
